<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal History — NutriTrack</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .main { padding: 40px 0 80px; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 1.9rem; margin-bottom: 6px; }
    .page-header p { color: var(--text-muted); }

    .filters-row {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 24px; align-items: flex-end;
    }
    .filters-row .form-group { margin-bottom: 0; flex: 1; min-width: 180px; }

    .summary-strip {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="toast-container"></div>

<nav class="navbar">
  <div class="container">
    <a class="nav-brand" href="dashboard.html">Nutri<span class="dot">Track</span></a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="add-meal.html">Add Meal</a>
      <a href="history.html" class="active">History</a>
      <a href="ai-chat.html">AI Coach</a>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>
</nav>

<main class="main">
  <div class="container">

    <div class="page-header">
      <h1>Meal History</h1>
      <p>Browse, search, and filter all your logged meals</p>
    </div>

    <!-- Filters -->
    <div class="card" style="margin-bottom:24px;">
      <div class="filters-row">
        <div class="form-group">
          <label>Search food</label>
          <input type="text" id="searchInput" placeholder="e.g. rice, chicken..." oninput="filterMeals()" />
        </div>
        <div class="form-group">
          <label>Filter by date</label>
          <input type="date" id="dateFilter" onchange="filterMeals()" />
        </div>
        <div style="display:flex; gap:8px; align-items:flex-end; padding-bottom:0;">
          <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
          <button class="btn btn-primary" onclick="filterMeals()">Apply</button>
        </div>
      </div>
      <div class="summary-strip" id="summaryStrip" style="display:none; padding-top:12px; border-top: 1px solid var(--border); margin-top:4px;"></div>
    </div>

    <!-- Table -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Food</th>
              <th>Calories</th>
              <th>Protein</th>
              <th>Carbs</th>
              <th>Fat</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="mealsBody"></tbody>
        </table>
      </div>

      <div id="emptyMeals" class="empty-state hidden" style="padding:60px;">
        <div class="icon">🍽️</div>
        <p>No meals found. <a href="add-meal.html" style="color:var(--accent)">Log your first meal →</a></p>
      </div>

      <div id="loadingMeals" class="empty-state">
        <div><span class="spinner"></span></div>
        <p style="margin-top:12px;">Loading meals...</p>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/meals.js"></script>
<script>
  let allMeals = [];

  async function initHistory() {
    await requireAuth();
    allMeals = await loadMeals();
    document.getElementById("loadingMeals").classList.add("hidden");
    renderMealTable(allMeals);
    updateSummary(allMeals);
  }

  function filterMeals() {
    const search = document.getElementById("searchInput").value.toLowerCase().trim();
    const date   = document.getElementById("dateFilter").value;

    const filtered = allMeals.filter(m => {
      const matchSearch = !search || m.food_name.toLowerCase().includes(search);
      const matchDate   = !date   || m.date === date;
      return matchSearch && matchDate;
    });

    renderMealTable(filtered);
    updateSummary(filtered);
  }

  function clearFilters() {
    document.getElementById("searchInput").value = "";
    document.getElementById("dateFilter").value  = "";
    renderMealTable(allMeals);
    updateSummary(allMeals);
  }

  function updateSummary(meals) {
    const strip = document.getElementById("summaryStrip");
    if (meals.length === 0) { strip.style.display = "none"; return; }

    const totals = meals.reduce((acc, m) => ({
      cal: acc.cal + (m.calories || 0),
      pro: acc.pro + (m.protein  || 0),
      car: acc.car + (m.carbs    || 0),
      fat: acc.fat + (m.fats     || 0),
    }), { cal: 0, pro: 0, car: 0, fat: 0 });

    strip.style.display = "flex";
    strip.innerHTML = `
      <span style="font-size:0.85rem; color:var(--text-muted); margin-right:4px;">${meals.length} meals ·</span>
      <span class="badge badge-accent">🔥 ${totals.cal} kcal</span>
      <span class="badge badge-accent" style="background:rgba(124,108,252,0.1); color:#a89cfc;">🥩 ${totals.pro}g protein</span>
      <span class="badge badge-warning">🌾 ${totals.car}g carbs</span>
      <span class="badge badge-danger">🥑 ${totals.fat}g fat</span>`;
  }

  initHistory();
</script>
</body>
</html>
